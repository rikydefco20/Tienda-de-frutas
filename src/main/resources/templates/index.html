<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Frutas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <h1>🍎 Tienda de Frutas</h1>
    <p>Frutas frescas y naturales</p>
</header>

<section class="hero">
    <h2>Las mejores frutas del mercado</h2>
    <p>Calidad, frescura y sabor natural.</p>
</section>

<section class="productos">

    <div class="card" th:each="fruta : ${frutas}">
        <h3 th:text="${fruta}"></h3>
        <p>Fruta fresca disponible</p>
        <button>Comprar</button>
    </div>

</section>

<footer>
    <p>© 2026 Tienda de Frutas</p>
</footer>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
